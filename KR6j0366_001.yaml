body:
  text: 金剛智所譯我依瑜伽經所說為像末薄福比丘久持諸佛祕密語若其福智不現前及以無官無位倫貴姓高人福因薄為化度一切衆生此顯明極祕密法三世諸佛神驗道速疾甚深究竟法釋尊遺法比丘等隨力而財寶布施為菩提果名薄貢傳受慎念可修行若布施不至恭敬受道修行不感應欲顯此法大驗力先當建立祕密盤白檀若柏桂又經百歲靈木用天盤造圓方二寸五分又三寸地盤四方六寸又七寸又天色皆經青地內院黃中院青外院赤下方四面空青下黃天厚一寸三分地厚一寸又八分作之天盤東面福智虛空藏菩薩像畫坐白寶蓮華戴五佛寶冠以種種瓔珞身嚴飾右手施無畏左手持寶蓮華華上有羯磨杵形色黃南方有怛洛字變成能滿虛空藏菩薩坐赤蓮華頂有五佛寶冠莊嚴如前形色赤肉右手持寶劍左執青蓮華華上有如意寶珠珠回有火焰西方有紇哩字變成施願虛空藏菩薩坐紫蓮華寶冠如前莊嚴如前合掌當胸前形色紅波利北方有噁字變成無垢虛空藏菩薩坐白蓮華寶冠如前莊嚴如前左手施無畏右手持寶蓮華華上有月輪形色水白中央有鑁字變成解脫虛空藏菩薩寶冠如前莊嚴如前坐黃白蓮華右手施無畏左手持寶蓮華華上有獨鈷杵色黃次天盤頂上畫七星王形像次地盤內院八方畫八天形像四角四天王形像如例東方帝釋天像如例南方焰魔天像如例西方梵天形如例北方毗沙門天像如例次中院二十八宿畫東方青色青衣男形七人持器仗南方赤色赤衣男形七人持器仗西方白色白衣男形七人持器仗北方黑色黑衣男形七人持器仗次外院三十六禽畫始自甲乙諸夜叉部尋之其形像畫若名字畫色形隨方角耳內院地黃中院地青外院地赤知之綵畫矣五大虛空藏菩薩成就悉地品第二根本最勝心陀羅尼曰南牟阿迦去引捨舒可反二揭魚羯反婆去引耶全可反三唵四阿唎迦入摩唎六𭋼唎七莎嚩訶八東方菩薩呪曰唵嚩日羅二合吽欲求官位正命者南方菩薩呪曰唵嚩日羅二合曩怛洛二合欲求富貴智惠者西方菩薩呪曰唵嚩日羅二合紇哩入欲求敬愛者北方菩薩呪曰唵嚩日羅二合噁欲求解脫息災者中央菩薩呪曰唵嚩日羅二合鑁欲求遂一切意願者印契如瑜伽經說修行者先相應壇場建立隨意樂處但可擇求寂靜處遠離憒鬧污穢不淨童男童女不信沙彌貧窮垢衣者勿親求成就庭好好謹慎調備供具奉置本尊盤增上向方隨願誦滿晝夜三時根本明一百萬遍即獲得大智惠得人中第一極大安樂若欲極一切大自在者隨方調備供具護摩一切所求皆悉成就護摩相應物等如說諸德悉地品但祕術可決師口傳像末弟子於法有輕熳心輒不授之依繁不記之若人欲得大智惠者以南方菩薩加毗沙門天祈之必得之若人欲得國王大愛念者以西方菩薩加毗沙門天祈之必得之若人欲得王后采女乃至諸貴女極愛者前菩薩加前天祈之必得之若人欲得大臣公卿愛念者以前菩薩如前天祈之必得之若人欲得大福長者成急者以南方菩薩加前天祈必得之若人欲得大官位歸依尊重者以東方菩薩加帝釋天祈必得之若人欲得勝諸人天下自在者以北方菩薩加梵天祈之必得之若人欲得遂一切所望出世間事者以中方菩薩加東方天祈必得若人欲得示他人大靈驗者以南方菩薩加西北方天祈之必令爾若人欲得大驗利益一切衆生者以東方菩薩加西南方天祈之必令爾若人欲得官爵職祿者以東方菩薩加毗沙門天祈之得若人欲得一切人愛念者以西方菩薩加前天祈之必得之若人欲得勝論議者以南方菩薩加梵天祈必令得之若人欲得惡人降伏者以北方菩薩加西南天祈必令爾若人欲得止熱病者以中方菩薩加西北方天祈之必除之若人欲得止癊病瘇疳癰病者以北方菩薩加西南方天祈必除之若人欲得除官位有障難者以東方菩薩加西北天祈必令得若人欲得成一切法師王者以南方菩薩加東南方天祈必得若人欲得諸佛菩薩護念者以中方菩薩加前天祈必得若人欲得諸富人愛念者以南方菩薩加毗沙門天祈必得若人欲得天狐地狐結縛者以東方菩薩加西南天祈之若人欲得除滅一切鬼神所著者以北方菩薩加焰魔天祈之若人欲得諸人決定業除滅者以東方菩薩加前天祈之若人欲得諸小兒短命夭壽消除者以東方菩薩加前天祈之若人欲得一切女人難産速生者以北方菩薩加前天祈之若人欲得止一切惡鬼被惡毒顛倒者以東方菩薩加前天祈之若人欲得返惡人呪咀者以北方菩薩加西南天祈之必得若人欲得止一切災火之難者以中方菩薩加西北方天祈之若人欲得除旱魃之難者以中方菩薩加帝釋天祈之若人欲得除疫病流行之災者以北方菩薩加焰魔天祈之若人欲得極樂往生上品上生者以西方菩薩加焰魔天祈之若人欲得拔濟七世父母六親并一切衆生地獄苦極樂往生者以西方菩薩加梵天祈之若人欲得夫婦相愛者以西方菩薩加毗沙門天書男女姓名和合天地間置封之祈之若人欲得夫婦令相離惡中者以北方菩薩加西南天祈之若人欲得夫女相離如本愛念者以西方菩薩加毗沙門天祈之若人欲得一切財物為盜紛失返得者以北方菩薩加焰魔天祈之必令得若人欲得從者并牛馬逃逝者以南方菩薩加梵天祈則得已上祕術條四十歟加持蘇密作法子細求聞持儀軌如說尋之知之件法天竺國於菩提所傳也其調度不多類時人皆號驗法焉加持供養物用馬頭明王印真言唵阿密栗妬納婆縛吽發吒娑婆訶大輪壇印二手各作拳地風各釣結當胸誦真言三遍轉之次加持壇次以印入自口真言曰唵縛日羅斫羯羅惹吽鑁斛念珠加持真言唵毗盧遮那摩黎娑婆訶次誦旋轉念珠明曰唵嚩日羅二合獄呬耶二合惹跛三去摩曳引吽吉祥天小呪唵摩訶支利曳婆娑婆訶天王梵字呪唵毗智須多迦悉者娑婆訶四天王通呪唵漸婆羅奢舉多羅耶娑婆訶使者呪唵豆留豆留地利地利度露度露迦他耶娑婆訶大三摩耶印真言曰二手作金剛拳背相合申二風頭相拄以印自心至頂三返舉之即頂散之曩莫三曼多沒馱喃達麼馱睹薩嚩二合婆嚩二合句唅廣大不空摩尼普供養印二手金剛合掌二頭指捻蹙如寶形並竪二大指即成誦不空摩尼供養真言曰唵阿上謨引伽去布惹自羅反一摩抳二尼那反跛納摩二合縛日隸二合怛他去蘖多尾路引枳帝三三去滿多鉢羅二合薩羅吽引四次取獨古左手拳安左腰即誦金剛杵真言三遍以杵左右各三遍轉投上三度加持五處安右乳上次執鈴左手誦真言三遍了五度振上左耳間二度振上次閒斷二度振上次以杵各左右三轉加持五處以杵鈴共安本所杵真言曰唵嚩日羅播儞吽鈴真言曰唵嚩日羅健吒覩使也斛次奉獻閼伽印明如常次虛空藏四方結如常次金剛牆如常次灑淨真言如常於仁和寺皆明寺以拇尾山法鼓臺本書寫畢于時天明二壬寅年秋八月四日夜燈下閣筆覺禪抄云式經一卷真僞可尋智積院東武慈忍享和元年次辛酉八月二日以智積慈忍師本令寫而挍正加點以印行豐山長谷寺總持院快道林常志享和三年癸亥三月小盡日甲子一校加筆訖慈順
